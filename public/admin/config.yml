backend:
  name: git-gateway
  repo: 0333PMD/2325Himount-Website
  branch: main
  squash_merges: true

publish_mode: editorial_workflow
media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Site Settings"
    files:
      - file: "content/site.yaml"
        label: "Global Settings"
        name: "global"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Phone Number", name: "phone_number", widget: "string" }
          - label: "Address"
            name: "address"
            widget: "object"
            fields:
              - { label: "Street", name: "street", widget: "string" }
              - { label: "City", name: "city", widget: "string" }
              - { label: "State", name: "state", widget: "string" }
              - { label: "ZIP", name: "zip", widget: "string" }

  - name: "units"
    label: "Unit Types"
    files:
      - file: "content/units.yaml"
        label: "Units"
        name: "units"
        fields:
          - label: "Units"
            name: "units"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Price Range", name: "price_range", widget: "string" }
              - { label: "Sq Ft", name: "sq_ft", widget: "number", required: false }
              - { label: "Availability", name: "availability", widget: "select", options: ["Available", "Waitlist", "Sold Out"] }
              - { label: "Features", name: "features", widget: "list", field: { label: "Feature", name: "feature", widget: "string" } }
              - { label: "Income Restricted", name: "income_restricted", widget: "boolean", default: false }

  - name: "pages"
    label: "Pages"
    folder: "content/pages"
    create: false
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
